<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subtitle Styles</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Subtitle Styles</h1>
    
    <form id="settings-form">
      <div class="form-group">
        <label for="character-edge-style">Character Edge Style</label>
        <select id="character-edge-style">
          <option value="auto">Auto (Default)</option>
          <option value="dropshadow">Drop Shadow</option>
          <option value="none">None</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="background-opacity">Background Opacity</label>
        <select id="background-opacity">
          <option value="auto">Auto (Default)</option>
          <option value="0">0%</option>
          <option value="25">25%</option>
          <option value="50">50%</option>
          <option value="75">75%</option>
          <option value="100">100%</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="window-opacity">Window Opacity</label>
        <select id="window-opacity">
          <option value="auto">Auto (Default)</option>
          <option value="0">0%</option>
          <option value="25">25%</option>
          <option value="50">50%</option>
          <option value="75">75%</option>
          <option value="100">100%</option>
        </select>
      </div>

      <div class="form-group">
        <label for="preset-select">Presets</label>
        <select id="preset-select">
          <option value="">Select Preset</option>
          <option value="highContrast">High Contrast</option>
          <option value="cinema">Cinema</option>
          <option value="minimal">Minimal</option>
          <option value="accessibility">Accessibility</option>
        </select>
      </div>
      
      <div id="message" class="message"></div>
      
      <div class="button-group">
        <button type="button" id="reset-btn">Reset</button>
      </div>
    </form>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
