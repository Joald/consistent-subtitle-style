<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo</title>
  <style>
    html,
    body {
      width: 48px;
      height: 48px;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ccc;
      font-family: 'Segoe UI', sans-serif;
    }

    .logo {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: linear-gradient(135deg, #3a3a4e 0%, #26314e 50%, #1f4470 100%);
      position: relative;
      box-shadow:
        0 3px 6px -2px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .logo::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .text {
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0;
      text-align: center;
      line-height: 1;
      position: absolute;
    }

    .word1 {
      text-shadow: -1px -1px 1px rgba(255, 255, 255, 0.5), 1px -1px 1px rgba(255, 255, 255, 0.5), -1px 1px 1px rgba(255, 255, 255, 0.5), 1px 1px 1px rgba(255, 255, 255, 0.5);
      background: #000;
      padding: 1px 3px;
      border-radius: 2px;
      bottom: 6px;
      left: 4px;
    }

    .word2 {
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .word3 {
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.95);
      top: 2px;
      right: 4px;
    }
  </style>
</head>

<body>
  <div class="logo">
    <span class="text word1">C</span>
    <span class="text word2">S</span>
    <span class="text word3">S</span>
  </div>
</body>

</html>
