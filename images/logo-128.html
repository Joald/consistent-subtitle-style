<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logo</title>
    <style>
      html,
      body {
        width: 128px;
        height: 128px;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ccc;
        font-family: 'Segoe UI', sans-serif;
      }

      .logo {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }

      .logo::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
        pointer-events: none;
      }

      .text {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-align: center;
        line-height: 1.75;
      }

      .word1 {
        text-shadow:
          -1px -1px 1px rgba(255, 255, 255, 0.5),
          1px -1px 1px rgba(255, 255, 255, 0.5),
          -1px 1px 1px rgba(255, 255, 255, 0.5),
          1px 1px 1px rgba(255, 255, 255, 0.5);
        background: #000;
        padding: 2px 6px;
        border-radius: 3px;
      }

      .word2 {
        text-shadow:
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
      }

      .word3 {
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.95);
      }
    </style>
  </head>

  <body>
    <div class="logo">
      <div class="text">
        <span class="word1">Consistent</span><br />
        <span class="word2">Subtitle</span><br />
        <span class="word3">Style</span>
      </div>
    </div>
  </body>
</html>
