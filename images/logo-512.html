<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo</title>
  <style>
    html,
    body {
      width: 512px;
      height: 512px;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ccc;
      font-family: 'Segoe UI', sans-serif;
    }

    .logo {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 100px 200px -48px rgba(0, 0, 0, 0.5),
        0 0 0 4px rgba(255, 255, 255, 0.1),
        inset 0 4px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .logo::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .text {
      color: #fff;
      font-size: 72px;
      font-weight: 600;
      letter-spacing: 2px;
      text-align: center;
      line-height: 1.75;
    }

    .word1 {
      text-shadow:
        -4px -4px 4px rgba(255, 255, 255, 0.5),
        4px -4px 4px rgba(255, 255, 255, 0.5),
        -4px 4px 4px rgba(255, 255, 255, 0.5),
        4px 4px 4px rgba(255, 255, 255, 0.5);
      background: #000;
      padding: 8px 24px;
      border-radius: 12px;
    }

    .word2 {
      text-shadow:
        -4px -4px 0 #000,
        4px -4px 0 #000,
        -4px 4px 0 #000,
        4px 4px 0 #000;
    }

    .word3 {
      text-shadow: 8px 8px 16px rgba(0, 0, 0, 0.95);
    }
  </style>
</head>

<body>
  <div class="logo">
    <div class="text">
      <span class="word1">Consistent</span><br />
      <span class="word2">Subtitle</span><br />
      <span class="word3">Style</span>
    </div>
  </div>
</body>

</html>
